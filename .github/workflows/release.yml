name: Release

on:
  push:
    branches: [main]

# Never run two releases concurrently (avoids a double-publish race).
concurrency: release-${{ github.ref }}

jobs:
  release:
    name: Version PR or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the "Version Packages" commit + git tags
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # npm provenance (OIDC), harmless if unused
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC) needs npm >= 11.5. With a Trusted Publisher configured on
      # npmjs.com for this repo + workflow, publishes are tokenless; NPM_TOKEN stays as a
      # fallback until then. Either way, --provenance attaches a signed SLSA statement.
      # PINNED, not @latest: npm 12.0.x returns empty stdout for `npm info --json` and
      # changed the E403 error shape, which makes changesets 2.31.0 think every package is
      # unpublished, attempt to republish all of them, and crash in isAlreadyPublishedError
      # ("Cannot read properties of undefined (reading 'includes')") before reaching the
      # packages that actually need publishing. 11.6.2 supports trusted publishing and the
      # formats changesets expects.
      - name: Upgrade npm (trusted publishing support)
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # When changesets are pending -> opens/updates the "Version Packages" PR.
      # When that PR is merged (versions bumped, no changesets left) -> runs
      # `pnpm release` (build all packages + `changeset publish`).
      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Generate npm provenance (verified build attestation). Requires id-token: write.
          NPM_CONFIG_PROVENANCE: "true"
